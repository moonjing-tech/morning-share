<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO监测 · 产品工作台</title>

<!-- 项目共享样式 -->
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/nav.css">

<!-- Chart.js（按模型统计用） -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

<style>
/* ===== GEO 专属深色主题 ===== */
:root {
  --geo-bg: #0f1419;
  --geo-card: #161c24;
  --geo-card-hover: #1c2430;
  --geo-border: #253040;
  --geo-text-primary: #e8eef8;
  --geo-text-body: #dbe7f5;
  --geo-text-secondary: #a8b8d3;
  --geo-text-muted: #8fa3c2;
  --geo-accent: #3b82f6;
  --geo-accent-hover: #2563eb;
  --geo-green: #22c55e;
  --geo-green-bg: rgba(34,197,94,0.12);
  --geo-red: #ef4444;
  --geo-red-bg: rgba(239,68,68,0.12);
  --geo-yellow: #f59e0b;
  --geo-yellow-bg: rgba(245,158,11,0.12);
  --geo-purple: #8b5cf6;
  --geo-input-bg: #1a212b;
  --geo-input-border: #253040;
  --geo-input-focus: #3b82f6;
  --geo-table-header: #1a212b;
  --geo-table-row-hover: rgba(59,130,246,0.04);
  --geo-badge-bg: rgba(139,92,246,0.12);
  --geo-badge-text: #a78bfa;
  --geo-modal-overlay: rgba(0,0,0,0.7);
  --geo-radius: 10px;
  --geo-radius-sm: 6px;
}

/* 重置 body 背景 */
body {
  background: var(--geo-bg);
  color: var(--geo-text-body);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

/* 覆盖 base.css 里可能冲突的样式 */
.layout {
  min-height: 100vh;
  background: var(--geo-bg);
}

.header {
  background: var(--geo-card);
  border-bottom: 1px solid var(--geo-border);
}

.header h1 {
  color: var(--geo-text-primary);
}

.content {
  padding: 24px 28px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ===== 统计卡片 ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--geo-card);
  border: 1px solid var(--geo-border);
  border-radius: var(--geo-radius);
  padding: 18px 20px;
  transition: border-color .2s;
}

.stat-card:hover {
  border-color: var(--geo-accent);
}

.stat-card .stat-label {
  font-size: 12.5px;
  color: var(--geo-text-muted);
  margin-bottom: 8px;
  letter-spacing: .3px;
  text-transform: uppercase;
}

.stat-card .stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--geo-text-primary);
  line-height: 1.1;
}

.stat-card .stat-sub {
  font-size: 12px;
  color: var(--geo-text-secondary);
  margin-top: 6px;
}

.stat-card.accent .stat-value { color: var(--geo-accent); }
.stat-card.green .stat-value { color: var(--geo-green); }
.stat-card.purple .stat-value { color: var(--geo-purple); }
.stat-card.yellow .stat-value { color: var(--geo-yellow); }

/* ===== 按模型统计卡片 ===== */
.provider-stats-section {
  margin-bottom: 20px;
}

.provider-stats-section .section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--geo-text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
}

.provider-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.provider-stat-card {
  background: var(--geo-card);
  border: 1px solid var(--geo-border);
  border-radius: var(--geo-radius);
  padding: 14px 18px;
}

.provider-stat-card .ps-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.provider-stat-card .ps-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--geo-text-primary);
}

.provider-stat-card .ps-model {
  font-size: 11px;
  color: var(--geo-text-muted);
  background: var(--geo-badge-bg);
  padding: 2px 8px;
  border-radius: 10px;
}

.provider-stat-card .ps-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.ps-metric {
  text-align: center;
  padding: 6px 4px;
  border-radius: var(--geo-radius-sm);
  background: rgba(255,255,255,0.02);
}

.ps-metric .ps-val {
  font-size: 18px;
  font-weight: 700;
  color: var(--geo-text-primary);
}

.ps-metric .ps-lbl {
  font-size: 10px;
  color: var(--geo-text-muted);
  margin-top: 2px;
}

.ps-metric.highlight .ps-val { color: var(--geo-green); }

/* ===== 操作栏 ===== */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.toolbar .search-input {
  flex: 1;
  min-width: 200px;
  max-width: 320px;
  padding: 9px 14px;
  background: var(--geo-input-bg);
  border: 1px solid var(--geo-input-border);
  border-radius: var(--geo-radius-sm);
  color: var(--geo-text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}

.toolbar .search-input:focus {
  border-color: var(--geo-input-focus);
}

.toolbar .search-input::placeholder {
  color: var(--geo-text-muted);
}

.toolbar select {
  padding: 9px 12px;
  background: var(--geo-input-bg);
  border: 1px solid var(--geo-input-border);
  border-radius: var(--geo-radius-sm);
  color: var(--geo-text-primary);
  font-size: 13px;
  outline: none;
  cursor: pointer;
}

.toolbar select:focus {
  border-color: var(--geo-input-focus);
}

/* ===== 按钮 ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 9px 16px;
  border-radius: var(--geo-radius-sm);
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--geo-accent);
  color: #fff;
}

.btn-primary:hover {
  background: var(--geo-accent-hover);
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--geo-border);
  color: var(--geo-text-primary);
}

.btn-outline:hover {
  border-color: var(--geo-accent);
  color: var(--geo-accent);
}

.btn-warning {
  background: var(--geo-yellow);
  color: #0f1419;
}

.btn-warning:hover {
  filter: brightness(1.1);
}

.btn-sm {
  padding: 5px 11px;
  font-size: 12px;
}

.btn-danger {
  background: var(--geo-red);
  color: #fff;
}

.btn-danger:hover {
  filter: brightness(1.15);
}

.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}

/* ===== 批量进度条 ===== */
.batch-progress {
  display: none;
  background: var(--geo-card);
  border: 1px solid var(--geo-border);
  border-radius: var(--geo-radius);
  padding: 14px 18px;
  margin-bottom: 14px;
  align-items: center;
  gap: 14px;
}

.batch-progress.active {
  display: flex;
}

.batch-progress .bp-bar-wrap {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
}

.batch-progress .bp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--geo-accent), var(--geo-purple));
  border-radius: 4px;
  transition: width .3s;
}

.batch-progress .bp-text {
  font-size: 13px;
  color: var(--geo-text-secondary);
  white-space: nowrap;
  min-width: 100px;
  text-align: right;
}

.batch-progress .bp-detail {
  font-size: 11px;
  color: var(--geo-text-muted);
  white-space: nowrap;
}

/* ===== 表格 ===== */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--geo-radius);
  border: 1px solid var(--geo-border);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  background: var(--geo-table-header);
  color: #b8c7df;
  font-weight: 600;
  padding: 12px 14px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--geo-border);
  position: sticky;
  top: 0;
  z-index: 1;
}

tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--geo-text-body);
  vertical-align: middle;
}

tbody tr:hover {
  background: var(--geo-table-row-hover);
}

tbody tr:last-child td {
  border-bottom: none;
}

/* ===== 徽标 ===== */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}

.badge-mentioned {
  background: var(--geo-green-bg);
  color: var(--geo-green);
}

.badge-not-mentioned {
  background: var(--geo-red-bg);
  color: var(--geo-red);
}

.badge-pending {
  background: var(--geo-yellow-bg);
  color: var(--geo-yellow);
}

.badge-track {
  background: var(--geo-badge-bg);
  color: var(--geo-badge-text);
}

.badge-provider {
  background: rgba(59,130,246,0.12);
  color: #60a5fa;
  font-family: monospace;
  font-size: 11px;
}

/* ===== 弹窗 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--geo-modal-overlay);
  z-index: 999;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: var(--geo-card);
  border: 1px solid var(--geo-border);
  border-radius: var(--geo-radius);
  width: 90vw;
  max-width: 780px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--geo-border);
}

.modal-header h3 {
  color: var(--geo-text-primary);
  font-size: 16px;
  margin: 0;
}

.modal-close {
  background: none;
  border: none;
  color: var(--geo-text-muted);
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

.modal-close:hover {
  color: var(--geo-text-primary);
}

.modal-body {
  padding: 20px 22px;
  overflow-y: auto;
  flex: 1;
  color: var(--geo-text-body);
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--geo-border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ===== 表单弹窗内 ===== */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12.5px;
  color: var(--geo-text-secondary);
  margin-bottom: 5px;
  font-weight: 500;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px 12px;
  background: var(--geo-input-bg);
  border: 1px solid var(--geo-input-border);
  border-radius: var(--geo-radius-sm);
  color: var(--geo-text-primary);
  font-size: 13px;
  outline: none;
  resize: vertical;
  font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--geo-input-focus);
}

.form-group textarea {
  min-height: 80px;
}

.form-hint {
  font-size: 11px;
  color: var(--geo-text-muted);
  margin-top: 4px;
}

/* ===== 来源标签（弹窗详情中） ===== */
.source-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.source-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}

.source-tag.explicit {
  background: var(--geo-green-bg);
  color: var(--geo-green);
}

.source-tag.inferred {
  background: var(--geo-yellow-bg);
  color: var(--geo-yellow);
}

.source-tag.synthesized {
  background: rgba(255,255,255,0.06);
  color: var(--geo-text-muted);
}

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--geo-text-muted);
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 14px;
}

.empty-state .empty-text {
  font-size: 14px;
}

/* ===== 响应式 ===== */
@media (max-width: 1000px) {
  .stats-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 640px) {
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .content {
    padding: 16px 14px;
  }
  .toolbar {
    flex-direction: column;
    align-items: stretch;
  }
  .toolbar .search-input {
    max-width: 100%;
  }
}
</style>
</head>
<body>

<div class="layout">
  <div id="nav-placeholder"></div>

  <div class="main">
    <div class="header">
      <h1>🌐 GEO 监测</h1>
    </div>

    <div class="content">
      <!-- 总体统计卡片 -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- 按模型统计卡片 -->
      <div class="provider-stats-section" id="providerStatsSection">
        <div class="section-title">📊 按模型统计</div>
        <div class="provider-stats-grid" id="providerStatsGrid"></div>
      </div>

      <!-- 操作栏 -->
      <div class="toolbar" id="toolbar">
        <input class="search-input" id="searchInput" placeholder="🔍 搜索问题..." />
        <select id="filterTrack">
          <option value="">全部赛道</option>
        </select>
        <select id="filterIntent">
          <option value="">全部意图</option>
        </select>
        <button class="btn btn-primary" id="btnAddQuestion">➕ 新增问题</button>
        <button class="btn btn-outline" id="btnRunSelected">▶️ 运行选中</button>
        <button class="btn btn-warning" id="btnBatchRun">⚡ 批量运行</button>
        <button class="btn btn-outline btn-sm" id="btnSetApiKey">🔑 API Key</button>
      </div>

      <!-- 批量进度 -->
      <div class="batch-progress" id="batchProgress">
        <span style="font-size:14px;">⚙️</span>
        <div class="bp-bar-wrap">
          <div class="bp-bar-fill" id="bpBarFill" style="width:0%"></div>
        </div>
        <span class="bp-detail" id="bpDetail"></span>
        <span class="bp-text" id="bpText">0 / 0</span>
      </div>

      <!-- 问题列表 -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:36px"><input type="checkbox" id="selectAll" /></th>
              <th>问题</th>

              <th>意图</th>
              <th>优先级</th>

        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">

        <div class="empty-text">暂无问题数据，点击"新增问题"开始</div>
      </div>
    </div>
  </div>
</div>

<!-- 运行详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="detailTitle">运行详情</h3>
      <button class="modal-close" id="detailClose">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="detailCloseBtn">关闭</button>
    </div>
  </div>
</div>

<!-- 新增/编辑问题弹窗 -->
<div class="modal-overlay" id="questionModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="questionModalTitle">新增问题</h3>
      <button class="modal-close" id="questionClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">

      </div>
      <div class="form-group">

      </div>
      <div class="form-group">
        <label>意图</label>
        <select id="qIntent">
          <option value="">请选择</option>
          <option value="推荐">推荐</option>
          <option value="对比">对比</option>
          <option value="查询">查询</option>
          <option value="评价">评价</option>
          <option value="科普">科普</option>
          <option value="其他">其他</option>

    <div class="modal-footer">
      <button class="btn btn-outline" id="questionCancel">取消</button>
      <button class="btn btn-primary" id="questionSave">保存</button>
    </div>
  </div>
</div>

<!-- API Key 弹窗 -->
<div class="modal-overlay" id="apiKeyModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3>🔑 Ark API Key</h3>
      <button class="modal-close" id="apiKeyClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>火山引擎 Ark API Key</label>
        <input id="apiKeyInput" type="password" placeholder="粘贴 Ark API Key..." />
        <div class="form-hint">Key 仅保存在浏览器本地，不会上传到数据库。</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="apiKeyCancel">取消</button>
      <button class="btn btn-primary" id="apiKeySave">保存</button>
    </div>
  </div>
</div>

<!-- 依赖 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared/config.js"></script>
<script src="shared/nav.js"></script>

<script>
(function () {
'use strict';

// ========== 初始化 Supabase ==========
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const GEO_API_KEY_STORAGE = (window.LS_KEYS && window.LS_KEYS.geoApiKey) || 'geo_ark_api_key';

// ========== 全局状态 ==========
let allQuestions = [];
let allProviders = [];
let latestRows = [];          // 来自 geo_question_provider_latest_runs
let sourceMatchRules = [];    // 来源匹配规则
let filteredRows = [];        // 过滤后的行

let batchState = {
  running: false,
  total: 0,
  done: 0,
  currentQuestion: '',
  currentProvider: ''
};

// ========== DOM 引用 ==========
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// ========== API Key ==========
function getApiKey() {
  return localStorage.getItem(GEO_API_KEY_STORAGE) || '';
}

function setApiKey(key) {
  localStorage.setItem(GEO_API_KEY_STORAGE, String(key || '').trim());
}

// ========== 来源字典加载 ==========
async function buildSourceMatchRules() {
  try {
    const { data, error } = await sb
      .from(window.SUPABASE_GEO_SOURCE_DICT_TABLE || 'geo_source_dict')
      .select('*')
      .eq('enabled', true)
      .order('priority', { ascending: true });

    if (error) {
      console.warn('加载来源字典失败:', error);
      return;
    }

    sourceMatchRules = (data || []).map(item => {
      const aliases = Array.isArray(item.aliases) ? item.aliases : [];
      const rawKeywords = [item.source_name, item.source_domain, ...aliases];
      const keywords = rawKeywords
        .filter(Boolean)
        .map(k => String(k).toLowerCase().trim())
        .filter(k => k.length >= 2);
      return {
        source_name: item.source_name,
        source_domain: item.source_domain || '',
        source_type: item.source_type || '未知',
        keywords: [...new Set(keywords)]
      };
    });
  } catch (err) {
    console.warn('构建来源规则失败:', err);
  }
}

// ========== 来源提取（规则匹配） ==========
function extractStructuredSources(answerText) {
  if (!answerText) return [];

  const text = String(answerText);

  // 兼容 [信息来源] / 【信息来源】
  const blockMatch = text.match(/[\[【]信息来源[\]】]([\s\S]*)$/);
  if (!blockMatch) return [];

  const block = blockMatch[1] || '';

  const lines = block
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean);

  const results = [];

  for (const rawLine of lines) {
    let line = rawLine;

    // 去掉开头的 "- "
    line = line.replace(/^[-•]\s*/, '');

    // 去掉“来源1：”“来源2:”前缀
    line = line.replace(/^来源\s*\d+\s*[：:]\s*/, '').trim();

    if (!line) continue;

    // 统一分隔符：把全角竖线替换成半角
    line = line.replace(/｜/g, '|');

    // 拆分字段
    let parts = line.split('|').map(x => x.trim()).filter(Boolean);

    if (!parts.length) continue;

    let sourceName = parts[0] || '未知';
    let sourceDomain = parts[1] || '';
    let sourceType = parts[2] || '未知';

    // 如果第三段后面还有说明，比如：
    // 官网（可查询ETF产品列表、规模及流动性）
    sourceType = sourceType.replace(/（.*?）/g, '').replace(/\(.*?\)/g, '').trim();

    // 如果第二段其实不是域名，而是类型，做容错
    if (sourceDomain && !looksLikeDomain(sourceDomain) && !sourceType) {
      sourceType = sourceDomain;
      sourceDomain = '';
    }

    // 如果第二段不是域名，但第三段为空，也兜底
    if (sourceDomain && !looksLikeDomain(sourceDomain) && sourceType === '未知') {
      sourceType = sourceDomain;
      sourceDomain = '';
    }
const standardized = standardizeSource(
  sourceName,
  sourceDomain,
  sourceType
);

results.push({
  source_name: standardized.source_name,
  source_domain: standardized.source_domain || null,
  source_type: standardized.source_type,
  attribution_type: sourceName.includes('综合市场公开信息') || sourceName.includes('模型综合知识')
    ? 'synthesized'
    : 'explicit',
  evidence_text: rawLine,
  confidence_score: sourceName.includes('综合市场公开信息') || sourceName.includes('模型综合知识')
    ? 0.40
    : 0.95,
  rank_no: results.length + 1
});
  }

  return results;
}

function looksLikeDomain(text) {
  const t = String(text || '').trim().toLowerCase();
  if (!t) return false;

  // 简单域名判断
  return /([a-z0-9-]+\.)+[a-z]{2,}/i.test(t);
}

function standardizeSource(sourceName, sourceDomain, sourceType) {
  const name = String(sourceName || '').trim();
  const domain = String(sourceDomain || '').trim().toLowerCase();
  const type = String(sourceType || '').trim();

  // 1. 天天基金
  if (
    name.includes('天天基金') ||
    name.includes('东方财富') ||
    domain.includes('eastmoney.com')
  ) {
    return {
      source_name: '天天基金',
      source_domain: 'eastmoney.com',
      source_type: '销售平台'
    };
  }

  // 2. 汇添富官网
  if (
    name.includes('汇添富') ||
    domain.includes('99fund.com')
  ) {
    return {
      source_name: '汇添富基金官网',
      source_domain: '99fund.com',
      source_type: '官网'
    };
  }

  // 3. Wind
  if (
    name.toLowerCase().includes('wind') ||
    domain.includes('wind.com.cn')
  ) {
    return {
      source_name: 'Wind',
      source_domain: 'wind.com.cn',
      source_type: '数据平台'
    };
  }

  // 4. 中国基金业协会
  if (
    name.includes('基金业协会') ||
    name.includes('中基协') ||
    domain.includes('amac.org.cn')
  ) {
    return {
      source_name: '中基协',
      source_domain: 'amac.org.cn',
      source_type: '监管机构'
    };
  }

  // 5. 中国证监会
  if (
    name.includes('证监会') ||
    domain.includes('csrc.gov.cn')
  ) {
    return {
      source_name: '中国证监会',
      source_domain: 'csrc.gov.cn',
      source_type: '监管机构'
    };
  }

  // 6. 上交所
  if (
    name.includes('上海证券交易所') ||
    domain.includes('sse.com.cn')
  ) {
    return {
      source_name: '上海证券交易所',
      source_domain: 'sse.com.cn',
      source_type: '监管机构'
    };
  }

  // 7. 深交所
  if (
    name.includes('深圳证券交易所') ||
    domain.includes('szse.cn')
  ) {
    return {
      source_name: '深圳证券交易所',
      source_domain: 'szse.cn',
      source_type: '监管机构'
    };
  }

  // 8. 易方达官网
  if (
    name.includes('易方达') ||
    domain.includes('efunds.com.cn')
  ) {
    return {
      source_name: '易方达基金官网',
      source_domain: 'efunds.com.cn',
      source_type: '官网'
    };
  }

  // 9. 华夏官网
  if (
    name.includes('华夏基金') ||
    domain.includes('chinaamc.com')
  ) {
    return {
      source_name: '华夏基金官网',
      source_domain: 'chinaamc.com',
      source_type: '官网'
    };
  }

  // 默认返回原值
  return {
    source_name: name || '未知',
    source_domain: domain || null,
    source_type: normalizeSourceType(type)
  };
}

function normalizeSourceType(type) {
  const t = String(type || '').trim();

  if (!t) return '未知';

  if (t.includes('官网')) return '官网';
  if (t.includes('销售平台')) return '销售平台';
  if (t.includes('数据平台')) return '数据平台';
  if (t.includes('新闻')) return '新闻媒体';
  if (t.includes('社区')) return '社区论坛';
  if (t.includes('百科')) return '百科';
  if (t.includes('监管') || t.includes('交易所')) return '监管机构';
  if (t.includes('应用商店')) return '应用商店';
  if (t.includes('未知')) return '未知';

  return '未知';
}

function extractSourcesFromAnswer(answerText) {
  // 1. 先解析结构化来源区块
  const structured = extractStructuredSources(answerText);
  if (structured.length) return structured;

  // 2. 再做关键词扫描（你原来的规则）
  const explicit = extractKeywordSources(answerText);
  if (explicit.length) return explicit;

  // 3. 最后兜底
  return [{
    source_name: '模型综合知识',
    source_domain: '',
    source_type: '未知',
    attribution_type: 'synthesized',
    evidence_text: '回答中未出现可识别的外部来源结构、名称或域名。',
    confidence_score: 0.30,
    rank_no: 1
  }];
}
// ========== 模型调用（带来源要求） ==========
async function callProvider(provider, question, apiKey) {
  const baseUrl = (provider.base_url || '').replace(/\/$/, '');
  const url = baseUrl + '/chat/completions';

  const systemPrompt = `
你是基金投研与财富管理领域助手。请回答用户问题，并严格遵守以下规则：

【回答规则】
1. 先直接给结论，再补充理由。
2. 尽量给出具体基金公司、基金品牌或产品名称。
3. 如果涉及数据、排名、产品信息、公司信息、监管政策、平台信息等，请尽量说明来源。
4. 回答最后必须追加一个固定板块，格式如下：

【信息来源】
- 来源1：来源名称｜来源域名｜来源类型
- 来源2：来源名称｜来源域名｜来源类型

5. 如果无法明确指出具体外部来源，也必须保留这个板块，并写：
【信息来源】
- 来源1：综合市场公开信息｜｜未知

6. 不要省略“【信息来源】”板块。
7. 不要输出 JSON，不要输出 Markdown 表格，使用自然语言正文 + 固定来源区块即可。

【来源类型可选值】
官网 / 销售平台 / 数据平台 / 新闻媒体 / 社区论坛 / 百科 / 监管机构 / 未知
  `.trim();

  const userPrompt = `
${question}

请务必在回答最后输出“【信息来源】”板块，且至少填写 1 条来源。
  `.trim();

  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: provider.model_name,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ],
      temperature: 0.4
    })
  });

  if (!resp.ok) {
    const text = await resp.text();
    throw new Error('调用失败: ' + resp.status + ' ' + text);
  }

  const json = await resp.json();
  return json?.choices?.[0]?.message?.content || '';
}
// ========== 品牌提及判断 ==========
function judgeTTF(rawResponse) {
  if (!rawResponse) {
    return { is_mentioned: false, is_first_mentioned: false, is_top_recommended: false, confidence_score: 0 };
  }

  const text = String(rawResponse);
  const textLower = text.toLowerCase();

  // 品牌关键词（含别名）
  const brandPatterns = [
    { name: '汇添富', patterns: ['汇添富', '添富基金', '99fund', 'htf'] },
    { name: '易方达', patterns: ['易方达'] },
    { name: '华夏', patterns: ['华夏基金', '华夏'] },
    { name: '广发', patterns: ['广发基金', '广发'] },
    { name: '富国', patterns: ['富国基金', '富国'] },
    { name: '中欧', patterns: ['中欧基金', '中欧'] },
    { name: '南方', patterns: ['南方基金'] },
    { name: '嘉实', patterns: ['嘉实基金', '嘉实'] },
    { name: '博时', patterns: ['博时基金', '博时'] },
    { name: '招商', patterns: ['招商基金'] },
    { name: '天弘', patterns: ['天弘基金', '天弘'] },
    { name: '景顺长城', patterns: ['景顺长城'] },
    { name: '兴证全球', patterns: ['兴证全球', '兴全'] },
    { name: '鹏华', patterns: ['鹏华基金', '鹏华'] },
    { name: '华安', patterns: ['华安基金', '华安'] }
  ];

  // 找到所有品牌在文本中的首次出现位置
  const mentions = [];
  for (const brand of brandPatterns) {
    let firstIdx = Infinity;
    for (const pat of brand.patterns) {
      const idx = textLower.indexOf(pat.toLowerCase());
      if (idx >= 0 && idx < firstIdx) {
        firstIdx = idx;
      }
    }
    if (firstIdx < Infinity) {
      mentions.push({ name: brand.name, firstIdx });
    }
  }

  // 按首次出现位置排序
  mentions.sort((a, b) => a.firstIdx - b.firstIdx);

  const isMentioned = mentions.some(m => m.name === '汇添富');
  const isFirstMentioned = mentions.length > 0 && mentions[0].name === '汇添富';

  // 推荐强度判断
  let isTopRecommended = false;
  let confidence = 0;

  if (isMentioned) {
    confidence += 0.4;

    // 检查是否有强推荐词
    const recommendPatterns = [
      /优先.*汇添富/,
      /推荐.*汇添富/,
      /首选.*汇添富/,
      /汇添富.*值得/,
      /汇添富.*更好/,
      /汇添富.*优秀/,
      /汇添富.*建议/,
      /看好.*汇添富/,
      /汇添富.*优势/,
      /重点.*汇添富/,
    ];

    for (const re of recommendPatterns) {
      if (re.test(text)) {
        isTopRecommended = true;
        confidence += 0.4;
        break;
      }
    }    if (isFirstMentioned) {
      confidence += 0.2;
    }
  }

  confidence = Math.min(1, confidence);

  return {
    is_mentioned: isMentioned,
    is_first_mentioned: isFirstMentioned,
    is_top_recommended: isTopRecommended,
    confidence_score: Math.round(confidence * 100) / 100
  };
}

// ========== 数据库操作 ==========
async function insertRunRecord(payload) {
  const table = window.SUPABASE_GEO_RUNS_TABLE || 'geo_runs';
  const { data, error } = await sb.from(table).insert(payload).select().single();
  if (error) throw error;
  return data;
}

async function insertRunSources(runId, questionObj, providerCode, modelName, sourceItems) {
  if (!Array.isArray(sourceItems) || !sourceItems.length) return;

  const table = window.SUPABASE_GEO_RUN_SOURCES_TABLE || 'geo_run_sources';
  const rows = sourceItems
    .filter(item => item && item.source_name)
    .map(item => ({
      run_id: runId,
      question_id: questionObj.id,
      provider: providerCode,
      model_name: modelName,
      source_name: String(item.source_name || '').trim(),
      source_domain: String(item.source_domain || '').trim() || null,
      source_type: String(item.source_type || '未知').trim() || '未知',
      attribution_type: String(item.attribution_type || 'inferred').trim() || 'inferred',
      evidence_text: String(item.evidence_text || '').trim() || null,
      confidence_score: Number(item.confidence_score || 0),
      rank_no: Number(item.rank_no || 0) || null
    }));

  if (!rows.length) return;

  const { error } = await sb.from(table).insert(rows);
  if (error) throw error;
}

async function saveQuestion(dataObj) {
  const table = window.SUPABASE_GEO_QUESTIONS_TABLE || 'geo_questions';
  const editId = dataObj.id;

  const payload = {
    question: dataObj.question,
    track: dataObj.track || null,
    intent: dataObj.intent || null,
    persona: dataObj.persona || null,
    priority: parseInt(dataObj.priority, 10) || 2,
    status: dataObj.status || 'active'
  };

  if (editId) {
    const { error } = await sb.from(table).update(payload).eq('id', editId);
    if (error) throw error;
  } else {
    const { error } = await sb.from(table).insert(payload);
    if (error) throw error;
  }
}

// ========== 单题 × 单模型运行 ==========
async function runOneQuestionWithProvider(questionObj, provider, apiKey) {
  const questionText = questionObj.question || '';
  let rawResponse = '';
  let judge = {
    is_mentioned: false,
    is_first_mentioned: false,
    is_top_recommended: false,
    confidence_score: 0
  };
  let runStatus = 'success';
  let insertedRun = null;

  try {
    rawResponse = await callProvider(provider, questionText, apiKey);
    judge = judgeTTF(rawResponse);
  } catch (err) {
    runStatus = 'failed';
    rawResponse = String(err.message || err || 'unknown error');
  }

  // 写入 geo_runs
  insertedRun = await insertRunRecord({
    question_id: questionObj.id,
    provider: provider.provider_code,
    model_name: provider.model_name,
    raw_response: rawResponse,
    is_mentioned: !!judge.is_mentioned,
    is_first_mentioned: !!judge.is_first_mentioned,
    is_top_recommended: !!judge.is_top_recommended,
    confidence_score: judge.confidence_score || 0,
    run_status: runStatus,
    run_time: new Date().toISOString()
  });

  // 来源提取 + 写入
  if (runStatus === 'success' && rawResponse.trim()) {
    const sourceItems = extractSourcesFromAnswer(rawResponse);

    if (!sourceItems.length) {
      sourceItems.push({
        source_name: '模型综合知识',
        source_domain: '',
        source_type: '未知',
        attribution_type: 'synthesized',
        evidence_text: '回答中未出现可识别的外部来源名称或域名。',
        confidence_score: 0.30,
        rank_no: 1
      });
    }

    try {
      await insertRunSources(
        insertedRun.id,
        questionObj,
        provider.provider_code,
        provider.model_name,
        sourceItems
      );
    } catch (attrErr) {
      console.warn('来源写入失败:', attrErr);
    }
  }

  return insertedRun;
}

function mapPriorityToNumber(p) {
  const map = { high: 3, medium: 2, low: 1, '高': 3, '中': 2, '低': 1 };
  if (map[p] !== undefined) return map[p];
  const n = parseInt(p, 10);
  return isNaN(n) ? 2 : n;
}

function formatPriority(p) {
  const map = { 3: '🔴 高', 2: '🟡 中', 1: '🟢 低', high: '🔴 高', medium: '🟡 中', low: '🟢 低' };
  return map[p] || String(p || '—');
}

// ========== 数据加载 ==========

    sb.from(window.SUPABASE_GEO_PROVIDER_LATEST_VIEW || 'geo_question_provider_latest_runs').select('*').order('question_id', { ascending: false })
  ]);

// ========== 筛选 ==========
function applyFilters() {
  const search = ($('#searchInput')?.value || '').toLowerCase().trim();
  const track = $('#filterTrack')?.value || '';
  const intent = $('#filterIntent')?.value || '';

  // 先按问题筛选
  let matchedQuestionIds = new Set();
  for (const q of allQuestions) {
    let match = true;
    if (search) {
      const qText = (q.question || '').toLowerCase();
      if (!qText.includes(search)) match = false;
    }
    if (track && q.track !== track) match = false;
    if (intent && q.intent !== intent) match = false;
    if (match) matchedQuestionIds.add(q.id);
  }

  // 从 latestRows 过滤
  filteredRows = latestRows.filter(r => matchedQuestionIds.has(r.question_id));
}

  const mentionRate = testedQuestions > 0 ? ((mentionedQuestions / testedQuestions) * 100).toFixed(1) : '—';
  const firstMentionRate = testedQuestions > 0 ? ((firstMentionQuestions / testedQuestions) * 100).toFixed(1) : '—';

// ========== 渲染按模型统计 ==========

        firstMentioned: 0,

    <div class="provider-stat-card">
      <div class="ps-header">
        <span class="ps-name">${escHtml(p.provider)}</span>
        <span class="ps-model">${escHtml(p.modelName)}</span>
      </div>
      <div class="ps-metrics">
        <div class="ps-metric">
          <div class="ps-val">${p.total}</div>
          <div class="ps-lbl">运行次数</div>
        </div>
        <div class="ps-metric highlight">
          <div class="ps-val">${mr}%</div>
          <div class="ps-lbl">提及率</div>
        </div>
        <div class="ps-metric">
          <div class="ps-val">${fmr}%</div>
          <div class="ps-lbl">首位提及</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ========== 渲染表格 ==========
function renderTable() {
  const tbody = $('#tableBody');
  const emptyState = $('#emptyState');

  if (!filteredRows.length && !allQuestions.length) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';

  // 按问题分组
  const questionMap = {};
  for (const q of allQuestions) {
    questionMap[q.id] = {
      id: q.id,
      question: q.question || '',
      track: q.track || '',
      intent: q.intent || '',
      persona: q.persona || '',
      priority: q.priority,
      status: q.status || 'active',
      runs: [] // { provider, model_name, is_mentioned, is_first_mentioned, run_status, run_id, run_time }
    };
  }

  for (const row of filteredRows) {
    if (questionMap[row.question_id]) {
      questionMap[row.question_id].runs.push({
        provider: row.provider || '',
        model_name: row.model_name || '',
        is_mentioned: row.is_mentioned,
        is_first_mentioned: row.is_first_mentioned,
        is_top_recommended: row.is_top_recommended,
        run_status: row.run_status || '',
        run_id: row.run_id,
        run_time: row.run_time || '',
        raw_response: row.raw_response || ''
      });
    }
  }

  // 排序：有 run 的优先，然后按 priority 降序
  const list = Object.values(questionMap).sort((a, b) => {
    const aHasRun = a.runs.length > 0 ? 1 : 0;
    const bHasRun = b.runs.length > 0 ? 1 : 0;
    if (aHasRun !== bHasRun) return bHasRun - aHasRun;
    return (b.priority || 0) - (a.priority || 0);
  });

  tbody.innerHTML = list.map(q => {
    // 按 provider 排序展示 runs
    const sortedRuns = q.runs.sort((a, b) => (a.provider || '').localeCompare(b.provider || ''));

    const runBadges = sortedRuns.map(r => {
      if (r.run_status !== 'success') {
        return `<span class="badge badge-pending" title="${escHtml(r.provider)}">⚠️ ${escHtml(r.provider)}</span>`;
      }
      if (r.is_mentioned) {
        return `<span class="badge badge-mentioned" title="${escHtml(r.provider)} / ${escHtml(r.model_name)}">✅ ${escHtml(r.provider)}</span>`;
      }
      return `<span class="badge badge-not-mentioned" title="${escHtml(r.provider)} / ${escHtml(r.model_name)}">❌ ${escHtml(r.provider)}</span>`;
    }).join(' ');

    const runCell = runBadges || '<span style="color:var(--geo-text-muted);font-size:12px">未运行</span>';

    return `
    <tr>
      <td><input type="checkbox" class="row-check" data-qid="${q.id}" /></td>
      <td>
        <div style="font-weight:500;color:var(--geo-text-primary);margin-bottom:2px">${escHtml(q.question)}</div>
        ${q.persona ? `<div style="font-size:11px;color:var(--geo-text-muted)">👤 ${escHtml(q.persona)}</div>` : ''}
      </td>
      <td>${q.track ? `<span class="badge badge-track">${escHtml(q.track)}</span>` : '—'}</td>
      <td>${escHtml(q.intent || '—')}</td>
      <td>${formatPriority(q.priority)}</td>
      <td>${runCell}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm btn-run-one" data-qid="${q.id}" title="对本题运行所有模型">▶️ 运行</button>
        <button class="btn btn-outline btn-sm btn-view-detail" data-qid="${q.id}">📋 详情</button>
      </td>
    </tr>`;
  }).join('');

  // 绑定事件
  tbody.querySelectorAll('.btn-run-one').forEach(btn => {
    btn.addEventListener('click', () => runSingleQuestion(parseInt(btn.dataset.qid)));
  });
  tbody.querySelectorAll('.btn-view-detail').forEach(btn => {
    btn.addEventListener('click', () => showDetail(parseInt(btn.dataset.qid)));
  });
}

// ========== 筛选下拉选项 ==========
function renderFilterOptions() {
  const tracks = [...new Set(allQuestions.map(q => q.track).filter(Boolean))].sort();
  const intents = [...new Set(allQuestions.map(q => q.intent).filter(Boolean))].sort();

  const trackSelect = $('#filterTrack');
  const currentTrack = trackSelect.value;
  trackSelect.innerHTML = '<option value="">全部赛道</option>' +
    tracks.map(t => `<option value="${escHtml(t)}" ${t === currentTrack ? 'selected' : ''}>${escHtml(t)}</option>`).join('');

  const intentSelect = $('#filterIntent');
  const currentIntent = intentSelect.value;
  intentSelect.innerHTML = '<option value="">全部意图</option>' +
    intents.map(i => `<option value="${escHtml(i)}" ${i === currentIntent ? 'selected' : ''}>${escHtml(i)}</option>`).join('');
}

// ========== 运行单个问题（所有模型） ==========
async function runSingleQuestion(qid) {
  const apiKey = getApiKey();
  if (!apiKey) {
    alert('请先设置 Ark API Key');
    openApiKeyModal();
    return;
  }

  if (batchState.running) {
    alert('批量运行进行中，请等待完成');
    return;
  }

  const qObj = allQuestions.find(q => q.id === qid);
  if (!qObj) return;

  const providers = allProviders;
  if (!providers.length) {
    alert('没有启用的模型配置');
    return;
  }

  batchState.running = true;
  batchState.total = providers.length;
  batchState.done = 0;
  showBatchProgress(true);
  updateBatchProgressUI(0, providers.length, qObj.question, '');

  for (const provider of providers) {
    batchState.currentProvider = provider.provider_code;
    updateBatchProgressUI(batchState.done, providers.length, qObj.question, provider.provider_code);
    try {
      await runOneQuestionWithProvider(qObj, provider, apiKey);
    } catch (err) {
      console.error('运行失败:', provider.provider_code, err);
    }
    batchState.done += 1;
    updateBatchProgressUI(batchState.done, providers.length, qObj.question, provider.provider_code);
  }

  batchState.running = false;
  showBatchProgress(false);
  await loadData();
}

// ========== 批量运行（全部问题 × 全部模型） ==========
async function batchRunAll() {
  const apiKey = getApiKey();
  if (!apiKey) {
    alert('请先设置 Ark API Key');
    openApiKeyModal();
    return;
  }

  if (batchState.running) {
    alert('批量运行进行中');
    return;
  }

  const questions = allQuestions.filter(q => q.status !== 'inactive');
  const providers = allProviders;

  if (!questions.length || !providers.length) {
    alert('没有问题或没有启用模型');
    return;
  }

  const totalOps = questions.length * providers.length;

  if (!confirm(`即将运行 ${questions.length} 题 × ${providers.length} 模型 = ${totalOps} 次，确认？`)) {
    return;
  }

  batchState.running = true;
  batchState.total = totalOps;
  batchState.done = 0;
  showBatchProgress(true);
  updateBatchProgressUI(0, totalOps, '', '');

  for (const qObj of questions) {
    for (const provider of providers) {
      if (!batchState.running) break; // 支持中断

      batchState.currentQuestion = qObj.question;
      batchState.currentProvider = provider.provider_code;
      updateBatchProgressUI(batchState.done, totalOps, qObj.question, provider.provider_code);

      try {
        await runOneQuestionWithProvider(qObj, provider, apiKey);
      } catch (err) {
        console.error('运行失败:', qObj.id, provider.provider_code, err);
      }

      batchState.done += 1;
      updateBatchProgressUI(batchState.done, totalOps, qObj.question, provider.provider_code);

      // 小延迟避免限流
      await sleep(300);
    }
  }

  batchState.running = false;
  showBatchProgress(false);
  await loadData();
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ========== 批量进度 UI ==========
function showBatchProgress(show) {
  const el = $('#batchProgress');
  if (show) {
    el.classList.add('active');
  } else {
    el.classList.remove('active');
  }
}

function updateBatchProgressUI(done, total, questionText, providerText) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  $('#bpBarFill').style.width = pct + '%';
  $('#bpText').textContent = `${done} / ${total}`;
  const qShort = questionText ? questionText.slice(0, 30) + (questionText.length > 30 ? '…' : '') : '';
  const pShort = providerText || '';
  $('#bpDetail').textContent = [qShort, pShort].filter(Boolean).join(' · ') || '准备中…';
}

// ========== 运行选中问题 ==========
async function runSelected() {
  const apiKey = getApiKey();
  if (!apiKey) {
    alert('请先设置 Ark API Key');
    openApiKeyModal();
    return;
  }

  if (batchState.running) {
    alert('批量运行进行中');
    return;
  }

  const checked = [...$$('.row-check:checked')].map(cb => parseInt(cb.dataset.qid));
  if (!checked.length) {
    alert('请先勾选问题');
    return;
  }

  const questions = allQuestions.filter(q => checked.includes(q.id));
  const providers = allProviders;
  const totalOps = questions.length * providers.length;

  if (!confirm(`即将对 ${questions.length} 题运行 ${providers.length} 个模型，共 ${totalOps} 次，确认？`)) return;

  batchState.running = true;
  batchState.total = totalOps;
  batchState.done = 0;
  showBatchProgress(true);

  for (const qObj of questions) {
    for (const provider of providers) {
      batchState.currentQuestion = qObj.question;
      batchState.currentProvider = provider.provider_code;
      updateBatchProgressUI(batchState.done, totalOps, qObj.question, provider.provider_code);

      try {
        await runOneQuestionWithProvider(qObj, provider, apiKey);
      } catch (err) {
        console.error('运行失败:', err);
      }
      batchState.done += 1;
      await sleep(300);
    }
  }

  batchState.running = false;
  showBatchProgress(false);
  await loadData();
}

// ========== 详情弹窗 ==========
async function showDetail(qid) {
  const qObj = allQuestions.find(q => q.id === qid);
  if (!qObj) return;

  // 获取该问题的所有 runs（不只是 latest）
  const { data: allRuns } = await sb
    .from(window.SUPABASE_GEO_RUNS_TABLE || 'geo_runs')
    .select('*')
    .eq('question_id', qid)
    .order('run_time', { ascending: false })
    .limit(50);

  // 获取所有 run_sources
  const runIds = (allRuns || []).map(r => r.id);
  let allSources = [];
  if (runIds.length) {
    const { data: sources } = await sb
      .from(window.SUPABASE_GEO_RUN_SOURCES_TABLE || 'geo_run_sources')
      .select('*')
      .in('run_id', runIds)
      .order('rank_no', { ascending: true });
    allSources = sources || [];
  }

  // 按 run_id 分组 sources
  const sourcesByRun = {};
  for (const s of allSources) {
    if (!sourcesByRun[s.run_id]) sourcesByRun[s.run_id] = [];
    sourcesByRun[s.run_id].push(s);
  }

  // 渲染
  $('#detailTitle').textContent = '📋 运行详情';
  let html = '';
  html += `<div style="margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid var(--geo-border)">
    <div style="font-size:15px;font-weight:600;color:var(--geo-text-primary);margin-bottom:6px">${escHtml(qObj.question)}</div>
    <div style="font-size:12px;color:var(--geo-text-muted);display:flex;gap:14px;flex-wrap:wrap">
      ${qObj.track ? `<span>🏷️ ${escHtml(qObj.track)}</span>` : ''}
      ${qObj.intent ? `<span>🎯 ${escHtml(qObj.intent)}</span>` : ''}
      ${qObj.persona ? `<span>👤 ${escHtml(qObj.persona)}</span>` : ''}
      <span>📊 ${formatPriority(qObj.priority)}</span>
    </div>
  </div>`;

  if (!allRuns || !allRuns.length) {
    html += '<div style="text-align:center;padding:30px;color:var(--geo-text-muted)">暂无运行记录</div>';
  } else {
    for (const run of allRuns) {
      const isSuccess = run.run_status === 'success';
      const statusIcon = isSuccess ? (run.is_mentioned ? '✅' : '❌') : '⚠️';
      const statusText = isSuccess ? (run.is_mentioned ? '提及' : '未提及') : '失败';

      const runSources = sourcesByRun[run.id] || [];

      html += `<div style="margin-bottom:14px;border:1px solid var(--geo-border);border-radius:8px;overflow:hidden">
        <div style="padding:10px 14px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div>
            <span class="badge badge-provider">${escHtml(run.provider || '—')}</span>
            <span style="font-size:11px;color:var(--geo-text-muted);margin-left:6px">${escHtml(run.model_name || '')}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:12px">
            <span>${statusIcon} ${statusText}</span>
            ${run.is_first_mentioned ? '<span style="color:var(--geo-green)">🥇 首位</span>' : ''}
            ${run.is_top_recommended ? '<span style="color:var(--geo-purple)">⭐ 强推荐</span>' : ''}
            <span style="color:var(--geo-text-muted)">置信 ${run.confidence_score || 0}</span>
            <span style="color:var(--geo-text-muted)">${formatTime(run.run_time)}</span>
          </div>
        </div>

        ${runSources.length ? `
        <div style="padding:8px 14px;border-top:1px solid var(--geo-border)">
          <div style="font-size:11px;color:var(--geo-text-muted);margin-bottom:4px">📎 识别来源：</div>
          <div class="source-tags">
            ${runSources.map(s => `
              <span class="source-tag ${s.attribution_type || 'inferred'}" title="${escHtml(s.evidence_text || '')}">
                ${escHtml(s.source_name)}
                <span style="opacity:0.7">${s.confidence_score ? Math.round(s.confidence_score * 100) + '%' : ''}</span>
              </span>
            `).join('')}
          </div>
        </div>` : ''}

        <div style="padding:10px 14px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:360px;overflow-y:auto;color:var(--geo-text-body);border-top:1px solid var(--geo-border)">
          ${escHtml(run.raw_response || '（空）')}
        </div>
      </div>`;
    }
  }

  $('#detailBody').innerHTML = html;
  $('#detailModal').classList.add('active');
}

function formatTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch {
    return iso;
  }
}

// ========== 弹窗控制 ==========
function openModal(id) { $('#' + id).classList.add('active'); }
function closeModal(id) { $('#' + id).classList.remove('active'); }

// ========== 新增/编辑问题 ==========
function openQuestionModal(editId) {
  if (editId) {
    const q = allQuestions.find(q => q.id === editId);
    if (!q) return;
    $('#questionModalTitle').textContent = '编辑问题';
    $('#qQuestion').value = q.question || '';
    $('#qTrack').value = q.track || '';
    $('#qIntent').value = q.intent || '';
    $('#qPersona').value = q.persona || '';
    $('#qPriority').value = String(q.priority || 2);
    $('#qEditId').value = q.id;
  } else {
    $('#questionModalTitle').textContent = '新增问题';
    $('#qQuestion').value = '';
    $('#qTrack').value = '';
    $('#qIntent').value = '';
    $('#qPersona').value = '';
    $('#qPriority').value = '2';
    $('#qEditId').value = '';
  }
  openModal('questionModal');
}

async function saveQuestionHandler() {
  const question = $('#qQuestion').value.trim();
  if (!question) {
    alert('请输入问题内容');
    return;
  }

  const dataObj = {
    id: $('#qEditId').value ? parseInt($('#qEditId').value, 10) : null,
    question,
    track: $('#qTrack').value.trim(),
    intent: $('#qIntent').value,
    persona: $('#qPersona').value.trim(),
    priority: parseInt($('#qPriority').value, 10) || 2,
    status: 'active'
  };

  try {
    await saveQuestion(dataObj);
    closeModal('questionModal');
    await loadData();
  } catch (err) {
    alert('保存失败: ' + (err.message || err));
  }
}

// ========== API Key 弹窗 ==========
function openApiKeyModal() {
  $('#apiKeyInput').value = getApiKey();
  openModal('apiKeyModal');
}

function saveApiKeyHandler() {
  setApiKey($('#apiKeyInput').value);
  closeModal('apiKeyModal');
}

// ========== HTML 转义 ==========
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ========== 事件绑定 ==========
function bindEvents() {
  // 搜索
  $('#searchInput').addEventListener('input', () => { applyFilters(); renderTable(); });
  $('#filterTrack').addEventListener('change', () => { applyFilters(); renderTable(); });
  $('#filterIntent').addEventListener('change', () => { applyFilters(); renderTable(); });

  // 全选
  $('#selectAll').addEventListener('change', () => {
    const checked = $('#selectAll').checked;
    $$('.row-check').forEach(cb => { cb.checked = checked; });
  });

  // 按钮
  $('#btnAddQuestion').addEventListener('click', () => openQuestionModal(null));
  $('#btnRunSelected').addEventListener('click', runSelected);
  $('#btnBatchRun').addEventListener('click', batchRunAll);
  $('#btnSetApiKey').addEventListener('click', openApiKeyModal);

  // 问题弹窗
  $('#questionSave').addEventListener('click', saveQuestionHandler);
  $('#questionCancel').addEventListener('click', () => closeModal('questionModal'));
  $('#questionClose').addEventListener('click', () => closeModal('questionModal'));

  // 详情弹窗
  $('#detailClose').addEventListener('click', () => closeModal('detailModal'));
  $('#detailCloseBtn').addEventListener('click', () => closeModal('detailModal'));

  // API Key 弹窗
  $('#apiKeySave').addEventListener('click', saveApiKeyHandler);
  $('#apiKeyCancel').addEventListener('click', () => closeModal('apiKeyModal'));
  $('#apiKeyClose').addEventListener('click', () => closeModal('apiKeyModal'));

  // 点击遮罩关闭
  window.addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) {
      e.target.classList.remove('active');
    }
  });

  // ESC 关闭
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      $$('.modal-overlay.active').forEach(m => m.classList.remove('active'));
    }
  });
}

// ========== 初始化 ==========
async function init() {
  bindEvents();
  await buildSourceMatchRules();
  await loadData();
}

// 启动
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
