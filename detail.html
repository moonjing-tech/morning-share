<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容详情 · 产品工作台</title>
  <link rel="stylesheet" href="shared/base.css">
  <link rel="stylesheet" href="shared/nav.css">
  <style>
    /* ── 页面布局 ── */
    .page-body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── 详情主体：左预览 + 右信息 ── */
    .detail-layout {
      display: flex;
      gap: var(--space-lg);
      height: 100%;
      min-height: 0;
    }

    /* ── 左侧预览区 ── */
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      flex-shrink: 0;
    }
    .preview-toolbar .preview-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    /* PDF / iframe 预览 */
    .preview-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    /* PDF.js canvas 渲染区 */
    .pdf-canvas-wrap {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: #404040;
    }
    .pdf-canvas-wrap canvas {
      max-width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    /* Word / 链接 预览占位 */
    .preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      color: var(--text-muted);
    }
    .preview-placeholder .ph-icon {
      font-size: 52px;
      opacity: 0.4;
    }
    .preview-placeholder p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* PDF 翻页控制 */
    .pdf-page-ctrl {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 12px;
      color: var(--text-secondary);
    }
    .pdf-page-ctrl input {
      width: 44px;
      text-align: center;
      padding: 3px 6px;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      outline: none;
    }

    /* ── 右侧信息区 ── */
    .info-pane {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      overflow-y: auto;
    }

    .info-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-md);
    }
    .info-card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: var(--space-sm);
      padding-bottom: var(--space-xs);
      border-bottom: 1px solid var(--border-subtle);
    }

    /* 基本信息行 */
    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 13px;
    }
    .meta-row:last-child { border-bottom: none; }
    .meta-key {
      color: var(--text-muted);
      flex-shrink: 0;
      width: 56px;
      font-size: 12px;
      padding-top: 1px;
    }
    .meta-val {
      color: var(--text-primary);
      flex: 1;
      word-break: break-all;
      line-height: 1.5;
    }
    .meta-val a {
      color: var(--primary-light);
      word-break: break-all;
    }
    .meta-val a:hover { text-decoration: underline; }

    /* 摘要编辑区 */
    .summary-edit {
      width: 100%;
      min-height: 120px;
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .summary-edit:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }
    .summary-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
    }

    /* AI 流式输出区 */
    .ai-stream-box {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: var(--space-sm) var(--space-md);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      min-height: 60px;
      white-space: pre-wrap;
      display: none;
    }
    .ai-stream-box.active { display: block; }

    /* 操作按钮组 */
    .action-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    /* 骨架屏 */
    .detail-skeleton {
      display: flex;
      gap: var(--space-lg);
      height: 100%;
    }
    .detail-skeleton .sk-left {
      flex: 1;
      border-radius: var(--radius-md);
    }
    .detail-skeleton .sk-right {
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
  </style>
</head>
<body>
<div class="page-body">

  <!-- 侧边栏占位 -->
  <div id="nav-placeholder"></div>

  <!-- 主内容区 -->
  <div class="content-area">

    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <!-- 面包屑 -->
        <div class="header-breadcrumb">
          <a class="crumb-link" href="index.html">🚀 晨会分享</a>
          <span class="crumb-sep">›</span>
          <span class="crumb-current" id="crumb-title">加载中…</span>
        </div>
      </div>
      <div class="header-actions" id="header-actions" style="display:none">
        <button class="btn btn-ghost btn-sm" onclick="openNewTab()">↗ 新窗口打开</button>
        <button class="btn btn-outline btn-sm" onclick="reGenSummary()">✨ 重新生成摘要</button>
        <button class="btn btn-danger btn-sm" onclick="openDeleteModal()">🗑 删除</button>
      </div>
    </header>

    <!-- 内容 -->
    <div class="content" id="main-content">

      <!-- 骨架屏（加载中） -->
      <div class="detail-skeleton" id="skeleton">
        <div class="skeleton sk-left"></div>
        <div class="sk-right">
          <div class="skeleton" style="height:40px;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="height:120px;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="height:80px;border-radius:var(--radius-md)"></div>
        </div>
      </div>

      <!-- 详情主体（加载后显示） -->
      <div class="detail-layout" id="detail-body" style="display:none">

        <!-- 左侧：预览区 -->
        <div class="preview-pane">
          <div class="preview-toolbar">
            <span class="preview-title" id="preview-label">文件预览</span>
            <!-- PDF 翻页控制（仅 PDF 显示） -->
            <div class="pdf-page-ctrl" id="pdf-ctrl" style="display:none">
              <button class="btn btn-ghost btn-sm" onclick="pdfPrevPage()">‹</button>
              <input type="number" id="pdf-page-input" min="1" value="1"
                     onchange="pdfGoPage(this.value)">
              <span id="pdf-total-pages">/ 1</span>
              <button class="btn btn-ghost btn-sm" onclick="pdfNextPage()">›</button>
            </div>
          </div>
          <div class="preview-body" id="preview-body">
            <!-- 内容由 JS 动态注入 -->
          </div>
        </div>

        <!-- 右侧：信息区 -->
        <div class="info-pane">

          <!-- 基本信息 -->
          <div class="info-card">
            <div class="info-card-title">基本信息</div>
            <div id="meta-rows"><!-- JS 注入 --></div>
          </div>

          <!-- 摘要 -->
          <div class="info-card">
            <div class="info-card-title">摘要</div>
            <!-- AI 流式输出 -->
            <div class="ai-stream-box" id="ai-stream-box"></div>
            <!-- 编辑区 -->
            <textarea class="summary-edit" id="summary-edit"
                      placeholder="暂无摘要，点击「重新生成摘要」或手动输入…"></textarea>
            <div class="summary-actions">
              <button class="btn btn-primary btn-sm w-full" onclick="saveSummary()">💾 保存摘要</button>
            </div>
          </div>

          <!-- 操作 -->
          <div class="info-card">
            <div class="info-card-title">操作</div>
            <div class="action-group">
              <button class="btn btn-outline w-full" onclick="openNewTab()">↗ 新窗口打开原文件</button>
              <button class="btn btn-outline w-full" onclick="reGenSummary()">✨ 重新生成摘要</button>
              <button class="btn btn-danger w-full" onclick="openDeleteModal()">🗑 删除此内容</button>
            </div>
          </div>

        </div>
      </div>

      <!-- 错误状态 -->
      <div class="empty-state" id="error-state" style="display:none">
        <div class="empty-icon">⚠️</div>
        <p id="error-msg">加载失败</p>
        <a href="index.html" class="btn btn-outline" style="margin-top:var(--space-md)">← 返回列表</a>
      </div>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     删除确认弹窗
══════════════════════════════════════════ -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <h3>🗑️ 确认删除</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--text-secondary)">
        确定要删除
        <strong id="delete-name" style="color:var(--text-primary)"></strong> 吗？<br>
        <span style="font-size:12px;color:var(--text-muted)">
          此操作不可撤销，文件将从云端移除。
        </span>
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     外部依赖
══════════════════════════════════════════ -->
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="shared/config.js"></script>
<script src="shared/nav.js"></script>

<!-- ══════════════════════════════════════════
     页面业务逻辑
══════════════════════════════════════════ -->
<script>
/* ── 状态 ── */
let currentItem  = null;
let pdfDoc       = null;
let pdfPageNum   = 1;
let pdfRendering = false;

/* ── 工具：Supabase Headers ── */
function sbHeaders(extra = {}) {
  return {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...extra
  };
}

/* ── 工具：安全获取 DOM ── */
function $(id) {
  return document.getElementById(id);
}

/* ── 工具：根据表结构获取可访问文件地址 ── */
function getPublicFileUrl(item) {
  if (!item) return '';

  const ext = (item.type || '').toLowerCase();

  // link 类型：直接返回原始链接
  if (ext === 'link') {
    return item.original_url || '';
  }

  const raw = (item.file_path || '').trim();
  if (!raw) return '';

  // 如果 file_path 本身已经是完整 URL，直接返回
  if (/^https?:\/\//i.test(raw)) {
    return raw;
  }

  // 否则按 Supabase Storage 相对路径拼接
  return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${raw}`;
}
/* ── 初始化 ── */
async function init() {
  try {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      showError('缺少内容 ID，请从列表页进入');
      return;
    }

    await loadItem(id);
  } catch (e) {
    console.error('init error:', e);
    showError(e.message || '页面初始化失败');
  }
}

/* ── 加载详情数据 ── */
async function loadItem(id) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${id}&select=*`,
      { headers: sbHeaders() }
    );

    if (!res.ok) {
      throw new Error(await res.text());
    }

    const data = await res.json();

    if (!Array.isArray(data) || !data.length) {
      throw new Error('内容不存在或已被删除');
    }

    currentItem = data[0];
    console.log('detail currentItem:', currentItem);

    renderDetail();
  } catch (e) {
    console.error('loadItem error:', e);
    showError(e.message || '加载详情失败');
  }
}

/* ── 渲染详情 ── */
function renderDetail() {
  if (!currentItem) {
    showError('未获取到内容数据');
    return;
  }

  const item = currentItem;
  const ext = (item.type || '').toLowerCase();
  const fileUrl = getPublicFileUrl(item);

  // 标题
  document.title = `${item.title || '详情'} · 产品工作台`;

  const crumbTitle = $('crumb-title');
  if (crumbTitle) crumbTitle.textContent = item.title || '未命名';

  const headerActions = $('header-actions');
  if (headerActions) headerActions.style.display = 'flex';

  // 基本信息
  const rows = [
    { key: '标题', val: escHtml(item.title || '未命名') },
    { key: '类型', val: `<span class="badge badge-info">${escHtml(ext.toUpperCase() || '—')}</span>` },
    { key: '时间', val: formatDate(item.created_at) },
    { key: '作者', val: escHtml(item.author || '—') },
    {
      key: '链接',
      val: fileUrl
        ? `<a href="${escHtml(fileUrl)}" target="_blank" title="${escHtml(fileUrl)}">
             ${ext === 'link' ? escHtml(fileUrl) : '点击打开文件'}
           </a>`
        : '—'
    }
  ];

  const metaRows = $('meta-rows');
  if (metaRows) {
    metaRows.innerHTML = rows.map(r => `
      <div class="meta-row">
        <span class="meta-key">${r.key}</span>
        <span class="meta-val">${r.val}</span>
      </div>
    `).join('');
  }

  const summaryEdit = $('summary-edit');
  if (summaryEdit) summaryEdit.value = item.summary || '';

  renderPreview(item);

  const skeleton = $('skeleton');
  const detailBody = $('detail-body');
  const errorState = $('error-state');

  if (skeleton) skeleton.style.display = 'none';
  if (detailBody) detailBody.style.display = 'flex';
  if (errorState) errorState.style.display = 'none';
}

/* ── 渲染预览区 ── */
function renderPreview(item) {
  const body  = $('preview-body');
  const label = $('preview-label');
  const pdfCtrl = $('pdf-ctrl');

  if (!body) {
    console.warn('preview-body not found');
    return;
  }

  const ext = (item.type || '').toLowerCase();
  const fileUrl = getPublicFileUrl(item);

  if (label) label.textContent = item.title || '文件预览';

  if (ext === 'pdf') {
    if (!fileUrl) {
      if (pdfCtrl) pdfCtrl.style.display = 'none';
      body.innerHTML = `
        <div class="preview-placeholder">
          <div class="ph-icon">⚠️</div>
          <p>该 PDF 缺少文件地址，无法预览</p>
        </div>`;
      return;
    }

    if (pdfCtrl) pdfCtrl.style.display = 'flex';
    body.innerHTML = `<div class="pdf-canvas-wrap" id="pdf-canvas-wrap"></div>`;
    loadPDF(fileUrl);
    return;
  }

  if (['doc', 'docx'].includes(ext)) {
    if (pdfCtrl) pdfCtrl.style.display = 'none';

    if (!fileUrl) {
      body.innerHTML = `
        <div class="preview-placeholder">
          <div class="ph-icon">⚠️</div>
          <p>该 Word 文件缺少文件地址，无法预览</p>
        </div>`;
      return;
    }

    body.innerHTML = `
      <div class="preview-placeholder">
        <div class="ph-icon">📝</div>
        <p>Word 文件预览加载中…</p>
      </div>`;
    loadWordPreview(fileUrl, body);
    return;
  }

  if (ext === 'link') {
    if (pdfCtrl) pdfCtrl.style.display = 'none';

    if (!fileUrl) {
      body.innerHTML = `
        <div class="preview-placeholder">
          <div class="ph-icon">⚠️</div>
          <p>该链接缺失，无法预览</p>
        </div>`;
      return;
    }

    body.innerHTML = `
      <iframe src="${escHtml(fileUrl)}"
              sandbox="allow-scripts allow-same-origin allow-popups"
              title="链接预览">
      </iframe>`;
    return;
  }

  // 其他文件类型
  if (pdfCtrl) pdfCtrl.style.display = 'none';
  body.innerHTML = `
    <div class="preview-placeholder">
      <div class="ph-icon">${fileTypeIcon(ext)}</div>
      <p>${escHtml(ext.toUpperCase() || '该文件')} 暂不支持在线预览</p>
      ${fileUrl ? `
        <a href="${escHtml(fileUrl)}" target="_blank"
           class="btn btn-outline" style="margin-top:var(--space-md)">
          ↗ 下载 / 新窗口打开
        </a>
      ` : ''}
    </div>`;
}

/* ── PDF.js 渲染 ── */
async function loadPDF(url) {
  try {
    if (!url || typeof url !== 'string') {
      throw new Error('文件 URL 为空或无效');
    }

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    if (!pdfjsLib) {
      throw new Error('pdf.js 未正确加载');
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    pdfDoc = await pdfjsLib.getDocument({ url }).promise;
    pdfPageNum = 1;

    const totalEl = $('pdf-total-pages');
    if (totalEl) totalEl.textContent = `/ ${pdfDoc.numPages}`;

    await renderPDFPage(pdfPageNum);
  } catch (e) {
    console.error('loadPDF error:', e);

    const previewBody = $('preview-body');
    const pdfCtrl = $('pdf-ctrl');
    const publicUrl = getPublicFileUrl(currentItem);

    if (pdfCtrl) pdfCtrl.style.display = 'none';

    if (previewBody) {
      previewBody.innerHTML = `
        <div class="preview-placeholder">
          <div class="ph-icon">⚠️</div>
          <p>PDF 加载失败：${escHtml(e.message || '未知错误')}</p>
          ${publicUrl ? `
            <a href="${escHtml(publicUrl)}" target="_blank"
               class="btn btn-outline" style="margin-top:var(--space-md)">
              ↗ 直接打开
            </a>
          ` : ''}
        </div>`;
    }
  }
}

async function renderPDFPage(num) {
  if (!pdfDoc || pdfRendering) return;

  const wrap = $('pdf-canvas-wrap');
  if (!wrap) return;

  pdfRendering = true;

  try {
    wrap.innerHTML = '';

    const start = Math.max(1, num);
    const end = Math.min(pdfDoc.numPages, num + 2);

    for (let i = start; i <= end; i++) {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: 1.5 });

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      wrap.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      await page.render({
        canvasContext: ctx,
        viewport
      }).promise;
    }

    const input = $('pdf-page-input');
    if (input) input.value = num;
  } catch (e) {
    console.error('renderPDFPage error:', e);
  } finally {
    pdfRendering = false;
  }
}

function pdfPrevPage() {
  if (!pdfDoc || pdfPageNum <= 1) return;
  pdfPageNum--;
  renderPDFPage(pdfPageNum);
}

function pdfNextPage() {
  if (!pdfDoc || pdfPageNum >= pdfDoc.numPages) return;
  pdfPageNum++;
  renderPDFPage(pdfPageNum);
}

function pdfGoPage(val) {
  const n = parseInt(val, 10);
  if (!pdfDoc || Number.isNaN(n)) return;
  pdfPageNum = Math.max(1, Math.min(pdfDoc.numPages, n));
  renderPDFPage(pdfPageNum);
}

/* ── Word 预览 ── */
async function loadWordPreview(url, container) {
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error('获取 Word 文件失败');

    const buffer = await response.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer: buffer });

    container.innerHTML = `
      <iframe
        srcdoc="${escAttr(wrapWordHtml(result.value))}"
        style="width:100%;height:100%;border:none;background:#fff">
      </iframe>`;
  } catch (e) {
    console.error('loadWordPreview error:', e);
    container.innerHTML = `
      <div class="preview-placeholder">
        <div class="ph-icon">📝</div>
        <p>Word 预览失败：${escHtml(e.message || '未知错误')}</p>
        <a href="${escHtml(url)}" target="_blank"
           class="btn btn-outline" style="margin-top:var(--space-md)">
          ↗ 下载文件
        </a>
      </div>`;
  }
}

/* ── 保存摘要 ── */
async function saveSummary() {
  if (!currentItem) return;

  const summaryEdit = $('summary-edit');
  const summary = summaryEdit ? summaryEdit.value.trim() : '';

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${currentItem.id}`,
      {
        method: 'PATCH',
        headers: sbHeaders({ Prefer: 'return=minimal' }),
        body: JSON.stringify({ summary })
      }
    );

    if (!res.ok) {
      throw new Error(await res.text());
    }

    currentItem.summary = summary;
    showToast('摘要已保存 ✓', 'success');
  } catch (e) {
    console.error('saveSummary error:', e);
    showToast('保存失败：' + e.message, 'error');
  }
}

/* ── 重新生成摘要 ── */
async function reGenSummary() {
  if (!currentItem) return;

  const streamBox = $('ai-stream-box');
  const editBox = $('summary-edit');
  const fileUrl = getPublicFileUrl(currentItem);

  if (!streamBox || !editBox) {
    showToast('摘要区域未找到', 'error');
    return;
  }

  streamBox.textContent = '';
  streamBox.classList.add('active');
  editBox.style.display = 'none';

  let text = '';

  try {
    const ext = (currentItem.type || '').toLowerCase();

    if (ext === 'pdf') {
      if (!fileUrl) throw new Error('PDF 文件地址缺失');
      text = await fetchAndExtractPDF(fileUrl);
    } else if (['doc', 'docx'].includes(ext)) {
      if (!fileUrl) throw new Error('Word 文件地址缺失');
      text = await fetchAndExtractWord(fileUrl);
    } else if (ext === 'link') {
      text = `链接：${currentItem.original_url || ''}\n标题：${currentItem.title || ''}`;
    } else {
      text = `文件名：${currentItem.title || ''}`;
    }
  } catch (e) {
    console.error('extract content error:', e);
    showToast('内容提取失败：' + e.message, 'error');
    streamBox.classList.remove('active');
    editBox.style.display = '';
    return;
  }

  try {
    const cfg = getAIConfig();

    const res = await fetch(`${cfg.url}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${cfg.key}`
      },
      body: JSON.stringify({
        model: cfg.model,
        stream: true,
        messages: [
          {
            role: 'system',
            content: '你是专业的产品助手，请对以下内容生成简洁专业的中文摘要（150字以内），突出核心观点。'
          },
          {
            role: 'user',
            content: text.slice(0, 3000)
          }
        ]
      })
    });

    if (!res.ok) {
      throw new Error(await res.text());
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let result = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      decoder.decode(value).split('\n').forEach(line => {
        if (!line.startsWith('data:')) return;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') return;

        try {
          const delta = JSON.parse(raw).choices?.[0]?.delta?.content || '';
          result += delta;
          streamBox.textContent = result;
        } catch (err) {
          console.warn('stream parse error:', err);
        }
      });
    }

    editBox.value = result;
    streamBox.classList.remove('active');
    editBox.style.display = '';
    showToast('摘要生成完成，请确认后保存', 'info');
  } catch (e) {
    console.error('reGenSummary error:', e);
    showToast('生成失败：' + e.message, 'error');
    streamBox.classList.remove('active');
    editBox.style.display = '';
  }
}

/* ── 提取 PDF 文本 ── */
async function fetchAndExtractPDF(url) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  if (!pdfjsLib) throw new Error('pdf.js 未加载');

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const pdf = await pdfjsLib.getDocument({ url }).promise;
  let text = '';

  for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(s => s.str).join(' ') + '\n';
  }

  return text;
}

/* ── 提取 Word 文本 ── */
async function fetchAndExtractWord(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error('获取 Word 文件失败');

  const buffer = await response.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buffer });
  return result.value || '';
}

/* ── 删除弹窗 ── */
function openDeleteModal() {
  if (!currentItem) return;

  const deleteName = $('delete-name');
  if (deleteName) deleteName.textContent = currentItem.title || '该内容';

  const modal = $('delete-modal');
  if (modal) modal.classList.add('open');
}

function closeDeleteModal() {
  const modal = $('delete-modal');
  if (modal) modal.classList.remove('open');
}

function getStorageObjectPath(item) {
  if (!item) return '';

  const raw = (item.file_path || '').trim();
  if (!raw) return '';

  // 如果本来就是相对路径，直接返回
  if (!/^https?:\/\//i.test(raw)) {
    return raw;
  }

  // 如果是完整 public URL，则提取 bucket 后面的对象路径
  const marker = `/storage/v1/object/public/${SUPABASE_BUCKET}/`;
  const idx = raw.indexOf(marker);
  if (idx >= 0) {
    return raw.slice(idx + marker.length);
  }

  return '';
}

async function confirmDelete() {
  if (!currentItem) return;

  try {
    // 删除 storage 文件（非 link）
    if ((currentItem.type || '').toLowerCase() !== 'link') {
      const objectPath = getStorageObjectPath(currentItem);

      if (objectPath) {
        const storageRes = await fetch(
          `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${objectPath}`,
          {
            method: 'DELETE',
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!storageRes.ok) {
          console.warn('storage delete failed:', await storageRes.text());
        }
      }
    }

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${currentItem.id}`,
      {
        method: 'DELETE',
        headers: sbHeaders()
      }
    );

    if (!res.ok) throw new Error(await res.text());

    showToast('删除成功，即将返回列表', 'success');
    setTimeout(() => {
      location.href = 'index.html';
    }, 1200);
  } catch (e) {
    console.error('confirmDelete error:', e);
    showToast('删除失败：' + e.message, 'error');
  }
}

/* ── 错误状态 ── */
function showError(msg) {
  console.error('showError:', msg);

  const skeleton = $('skeleton');
  const detailBody = $('detail-body');
  const errorMsg = $('error-msg');
  const errorState = $('error-state');

  if (skeleton) skeleton.style.display = 'none';
  if (detailBody) detailBody.style.display = 'none';
  if (errorMsg) errorMsg.textContent = msg || '加载失败';
  if (errorState) errorState.style.display = 'flex';
}

/* ── 工具函数 ── */
function fileTypeIcon(type) {
  const map = {
    pdf: '📄',
    ppt: '📊',
    pptx: '📊',
    doc: '📝',
    docx: '📝',
    link: '🔗'
  };
  return map[(type || '').toLowerCase()] || '📁';
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '—';
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

  });
