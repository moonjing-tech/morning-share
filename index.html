<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晨会分享 · 投研工作台</title>
  <link rel="stylesheet" href="shared/base.css">
  <link rel="stylesheet" href="shared/nav.css">
  <style>
    /* ── 页面布局 ── */
    .page-body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 内容区 ── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── 列表区 ── */
    /* ── 列表区 ── */
.list-wrap {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

/* ── 文件卡片 ── */
.file-card {
  background: rgba(16,24,48,0.9);
  border: 1px solid rgba(120,160,255,0.45);
  border-radius: 14px;
  padding: 0;
  display: flex;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.file-card:hover {
  border-color: rgba(120,160,255,0.75);
  box-shadow: 0 8px 32px rgba(79,142,247,0.15);
  transform: translateY(-2px);
}

/* 左侧预览图区域 */
.file-thumb {
  width: 120px;
  flex-shrink: 0;
  background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(124,58,237,0.1));
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border-right: 1px solid rgba(120,160,255,0.3);
}
.file-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.file-thumb .thumb-icon {
  font-size: 36px;
  opacity: 0.7;
}
.file-thumb .type-badge {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
.badge-pdf  { background:rgba(239,68,68,0.25);  color:#fca5a5; border:1px solid rgba(239,68,68,0.5); }
.badge-ppt  { background:rgba(249,115,22,0.25); color:#fdba74; border:1px solid rgba(249,115,22,0.5); }
.badge-pptx { background:rgba(249,115,22,0.25); color:#fdba74; border:1px solid rgba(249,115,22,0.5); }
.badge-doc  { background:rgba(59,130,246,0.25);  color:#93c5fd; border:1px solid rgba(59,130,246,0.5); }
.badge-docx { background:rgba(59,130,246,0.25);  color:#93c5fd; border:1px solid rgba(59,130,246,0.5); }
.badge-link { background:rgba(6,182,212,0.25);   color:#67e8f9; border:1px solid rgba(6,182,212,0.5); }

/* 右侧信息区 */
.file-info {
  flex: 1;
  min-width: 0;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.file-name {
  font-size: 15px;
  font-weight: 700;
  color: #ffffff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-summary {
  font-size: 13px;
  color: #b0c4de;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.6;
}
.file-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.file-author {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #93c5fd;
}
.author-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg,#4f8ef7,#7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #fff;
  font-weight: 700;
  flex-shrink: 0;
}
.file-date {
  font-size: 12px;
  color: #7a90b0;
  display: flex;
  align-items: center;
  gap: 4px;
}
.parse-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.status-done    { background:rgba(34,197,94,0.12);  color:#6ee7b7; border:1px solid rgba(34,197,94,0.25); }
.status-parsing { background:rgba(250,204,21,0.12); color:#fcd34d; border:1px solid rgba(250,204,21,0.25); animation:pulse 1.5s infinite; }
.status-error   { background:rgba(239,68,68,0.12);  color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* 右侧操作按钮 */
.file-actions {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  padding: 16px 14px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .2s;
}
.file-card:hover .file-actions {
  opacity: 1;
}

    /* ── 拖拽上传区 ── */
    .drop-zone {
      border: 2px dashed var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-xl);
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      background: var(--bg-surface);
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--primary);
      background: rgba(79, 142, 247, 0.05);
      box-shadow: 0 0 0 4px rgba(79, 142, 247, 0.08);
    }
    .drop-zone .drop-icon {
      font-size: 32px;
      margin-bottom: var(--space-sm);
      opacity: 0.6;
    }
    .drop-zone p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }
    .drop-zone .drop-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── 上传弹窗内容 ── */
    .upload-tabs {
      display: flex;
      gap: 2px;
      background: var(--bg-base);
      border-radius: var(--radius-sm);
      padding: 3px;
      margin-bottom: var(--space-md);
    }
    .upload-tab {
      flex: 1;
      padding: 7px;
      text-align: center;
      font-size: 13px;
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      user-select: none;
    }
    .upload-tab.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-weight: 600;
    }
    .upload-panel { display: none; }
    .upload-panel.active { display: block; }

    .form-group {
      margin-bottom: var(--space-md);
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .progress-bar-wrap {
      height: 4px;
      background: var(--bg-elevated);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-top: var(--space-sm);
    }
    .progress-bar {
      height: 100%;
      background: var(--primary);
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 0.3s ease;
    }

    .ai-summary-box {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      min-height: 80px;
      white-space: pre-wrap;
    }

    /* ── AI配置弹窗 ── */
    .config-field {
      margin-bottom: var(--space-md);
    }

    /* ── 筛选/搜索栏 ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .toolbar .input {
      max-width: 220px;
    }
  </style>
</head>
<body>
<div class="page-body">

  <!-- 侧边栏占位，由 nav.js 替换 -->
  <div id="nav-placeholder"></div>

  <!-- 主内容区 -->
  <div class="content-area">

    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <span class="page-icon">🚀</span>
        <h1>晨会分享</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="openAIConfigModal()">⚙️ AI配置</button>
        <button class="btn btn-primary btn-sm" onclick="openUploadModal()">＋ 上传内容</button>
      </div>
    </header>

    <!-- 内容 -->
    <div class="content" id="main-content">

      <!-- 工具栏 -->
      <div class="toolbar">
        <input class="input" id="search-input" placeholder="🔍 搜索标题或摘要…" oninput="renderList()">
        <select class="select" id="type-filter" onchange="renderList()" style="max-width:120px">
          <option value="">全部类型</option>
          <option value="pdf">PDF</option>
          <option value="ppt">PPT</option>
          <option value="word">Word</option>
          <option value="link">链接</option>
        </select>
        <span style="margin-left:auto;font-size:12px;color:var(--text-muted)" id="count-label"></span>
      </div>

      <!-- 列表 -->
      <div class="list-wrap" id="file-list">
        <!-- 骨架屏 -->
        <div class="skeleton" style="height:80px;border-radius:var(--radius-md)"></div>
        <div class="skeleton" style="height:80px;border-radius:var(--radius-md)"></div>
        <div class="skeleton" style="height:80px;border-radius:var(--radius-md)"></div>
      </div>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     上传弹窗
══════════════════════════════════════════ -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3>📤 上传内容</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeUploadModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- Tab 切换 -->
      <div class="upload-tabs">
        <div class="upload-tab active" data-tab="file" onclick="switchUploadTab('file')">📁 文件</div>
        <div class="upload-tab" data-tab="link" onclick="switchUploadTab('link')">🔗 链接</div>
      </div>

      <!-- 文件面板 -->
      <div class="upload-panel active" id="tab-file">
        <div class="drop-zone" id="drop-zone"
             onclick="document.getElementById('file-input').click()"
             ondragover="onDragOver(event)"
             ondragleave="onDragLeave(event)"
             ondrop="onDrop(event)">
          <div class="drop-icon">📂</div>
          <p>点击选择或拖拽文件到此处</p>
          <div class="drop-hint">支持 PDF · PPT · PPTX · DOC · DOCX，单文件最大 50MB</div>
        </div>
        <input type="file" id="file-input" accept=".pdf,.ppt,.pptx,.doc,.docx"
               style="display:none" onchange="onFileSelected(event)">

        <!-- 已选文件 -->
        <div id="selected-file-info" style="display:none;margin-top:var(--space-md)">
          <div class="card" style="padding:var(--space-sm) var(--space-md)">
            <div class="flex items-center gap-sm">
              <span id="selected-file-icon" style="font-size:20px"></span>
              <div style="flex:1;min-width:0">
                <div class="truncate" style="font-size:13px;font-weight:600" id="selected-file-name"></div>
                <div style="font-size:11px;color:var(--text-muted)" id="selected-file-size"></div>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="clearSelectedFile()">✕</button>
            </div>
            <div class="progress-bar-wrap" id="upload-progress-wrap" style="display:none">
              <div class="progress-bar" id="upload-progress-bar"></div>
            </div>
          </div>
        </div>

        <!-- 标题（可选覆盖） -->
        <div class="form-group" style="margin-top:var(--space-md)">
          <label class="form-label">标题（选填，留空则用文件名）</label>
          <input class="input" id="file-title" placeholder="自定义显示标题…">
        </div>
      </div>

      <!-- 链接面板 -->
      <div class="upload-panel" id="tab-link">
        <div class="form-group">
          <label class="form-label">链接地址</label>
          <input class="input" id="link-url" placeholder="https://…" oninput="onLinkInput()">
        </div>
        <div class="form-group">
          <label class="form-label">标题</label>
          <input class="input" id="link-title" placeholder="请输入标题…">
        </div>
      </div>

      <!-- AI 摘要 -->
      <div class="form-group" style="margin-top:var(--space-md)">
        <div class="flex items-center justify-between" style="margin-bottom:var(--space-xs)">
          <label class="form-label" style="margin:0">AI 摘要</label>
          <button class="btn btn-outline btn-sm" id="ai-btn" onclick="generateAISummary()">✨ 生成摘要</button>
        </div>
        <div class="ai-summary-box" id="ai-summary" contenteditable="true"
             data-placeholder="AI 生成摘要后可在此手动编辑…">AI 生成摘要后可在此手动编辑…</div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeUploadModal()">取消</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitUpload()">📤 提交</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     页面业务逻辑
══════════════════════════════════════════ -->
<script>
/* ── 状态 ──────────────────────────────────────────────────── */
let allItems    = [];     // 全量数据
let uploadTab   = 'file'; // 当前上传 tab
let selectedFile = null;  // 已选文件对象
let deletingId  = null;   // 待删除 ID
let pendingFileUrl = null; // 上传后的文件 URL（提交前）

/* ── Supabase 工具 ─────────────────────────────────────────── */
function sbHeaders(extra = {}) {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...extra
  };
}

/* ── 初始化：加载列表 ───────────────────────────────────────── */
async function loadList() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=*&order=created_at.desc`,
      { headers: sbHeaders() }
    );
    if (!res.ok) throw new Error(await res.text());
    allItems = await res.json();
    renderList();
  } catch (e) {
    document.getElementById('file-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p>加载失败：${e.message}</p></div>`;
  }
}

/* ── 渲染列表 ───────────────────────────────────────────────── */
function renderList() {
  const kw   = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const type = document.getElementById('type-filter').value;

  const filtered = allItems.filter(item => {
    const matchKw   = !kw || (item.title||'').toLowerCase().includes(kw)
                           || (item.summary||'').toLowerCase().includes(kw);
    const matchType = !type || item.type === type;
    return matchKw && matchType;
  });

  document.getElementById('count-label').textContent = `共 ${filtered.length} 条`;

  const container = document.getElementById('file-list');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>${kw || type ? '没有符合条件的内容' : '还没有分享内容，点击右上角上传'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(item => {
    const ext = (item.type || '').toLowerCase();

    // 左侧缩略图
    const thumbInner = item.cover_url
      ? `<img src="${escHtml(item.cover_url)}" alt=""
              onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        + `<div class="thumb-icon" style="display:none">${fileTypeIcon(ext)}</div>`
      : `<div class="thumb-icon">${fileTypeIcon(ext)}</div>`;

    // 解析状态
    const statusMap = {
      done:    { cls: 'status-done',    txt: '✓ 已解析' },
      parsing: { cls: 'status-parsing', txt: '⏳ 解析中' },
      error:   { cls: 'status-error',   txt: '✗ 失败'   },
    };
    const st = statusMap[item.parse_status] || statusMap.done;

    // 分享人
    const author   = item.author || '匿名';
    const initial  = author.charAt(0);

    return `
      <div class="file-card" onclick="goDetail('${item.id}')">

        <!-- 左侧预览图 -->
        <div class="file-thumb">
          ${thumbInner}
          <span class="type-badge badge-${ext}">${ext.toUpperCase()}</span>
        </div>

        <!-- 中间信息 -->
        <div class="file-info">
          <div class="file-name">${escHtml(item.title || '未命名')}</div>
          <div class="file-summary">${escHtml(item.summary || '暂无摘要')}</div>
          <div class="file-meta">
            <div class="file-author">
              <div class="author-avatar">${escHtml(initial)}</div>
              ${escHtml(author)}
            </div>
            <span class="file-date">📅 ${formatDate(item.created_at)}</span>
            <span class="parse-status ${st.cls}">${st.txt}</span>
          </div>
        </div>

        <!-- 右侧操作 -->
        <div class="file-actions" onclick="event.stopPropagation()">
          <button class="btn btn-danger btn-sm" title="删除"
            onclick="openDeleteModal('${item.id}','${escHtml(item.title||'该文件')}')">🗑</button>
        </div>

      </div>`;
  }).join('');
}

/* ── 跳转详情页 ─────────────────────────────────────────────── */
function goDetail(id) {
  location.href = `detail.html?id=${id}`;
}

/* ── 预览（新窗口打开文件 URL）─────────────────────────────── */
function previewItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  if (item.type === 'link') {
    window.open(item.file_url, '_blank');
  } else {
    window.open(item.file_url, '_blank');
  }
}

/* ── 上传弹窗 ───────────────────────────────────────────────── */
function openUploadModal() {
  resetUploadModal();
  document.getElementById('upload-modal').classList.add('open');
}
function closeUploadModal() {
  document.getElementById('upload-modal').classList.remove('open');
}
function resetUploadModal() {
  switchUploadTab('file');
  selectedFile   = null;
  pendingFileUrl = null;
  document.getElementById('selected-file-info').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('file-title').value = '';
  document.getElementById('link-url').value   = '';
  document.getElementById('link-title').value = '';
  document.getElementById('ai-summary').textContent = 'AI 生成摘要后可在此手动编辑…';
  document.getElementById('upload-progress-wrap').style.display = 'none';
  document.getElementById('upload-progress-bar').style.width = '0%';
  document.getElementById('submit-btn').disabled = false;
}

function switchUploadTab(tab) {
  uploadTab = tab;
  document.querySelectorAll('.upload-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.querySelectorAll('.upload-panel').forEach(el => {
    el.classList.toggle('active', el.id === `tab-${tab}`);
  });
}

  document.getElementById('drop-zone').classList.add('drag-over');
}
function onDragLeave(e) {

  document.getElementById('selected-file-icon').textContent = fileTypeIcon(ext);
  document.getElementById('selected-file-name').textContent = file.name;
  document.getElementById('selected-file-size').textContent = formatSize(file.size);

function clearSelectedFile() {

  document.getElementById('selected-file-info').style.display = 'none';

/* ── AI 摘要生成 ─────────────────────────────────────────────── */
async function generateAISummary() {
  const btn = document.getElementById('ai-btn');
  const box = document.getElementById('ai-summary');
  let text = '';

  // 1. 提取文本内容
  try {
    if (uploadTab === 'link') {
      const url = document.getElementById('link-url').value.trim();
      if (!url) { showToast('请先填写链接地址', 'error'); return; }
      text = `链接：${url}\n标题：${document.getElementById('link-title').value.trim()}`;
    } else if (selectedFile) {
      const ext = selectedFile.name.split('.').pop().toLowerCase();
      if (ext === 'pdf') {
        text = await extractPdfText(selectedFile);
      } else if (['doc','docx'].includes(ext)) {
        text = await extractWordText(selectedFile);
      } else {
        text = `文件名：${selectedFile.name}（PPT 暂不支持文本提取，请手动填写摘要）`;
      }
    } else {
      showToast('请先选择文件或填写链接', 'error');
      return;
    }
  } catch (e) {
    showToast('内容提取失败：' + e.message, 'error');
    return;
  }

  // 2. 调用 AI
  btn.disabled = true;
  btn.textContent = '生成中…';
  box.textContent = '';

  try {
    const cfg = getAIConfig();
    const res = await fetch(`${cfg.url}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.key}` },
      body: JSON.stringify({
        model: cfg.model,
        stream: true,
        messages: [
          { role: 'system', content: '你是一个专业的投研助手，请对以下内容生成一段简洁、专业的中文摘要（150字以内），突出核心观点。' },
          { role: 'user', content: text.slice(0, 3000) }
        ]
      })
    });
    if (!res.ok) throw new Error(await res.text());

    // 流式读取
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    box.textContent = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      chunk.split('\n').forEach(line => {
        if (!line.startsWith('data:')) return;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') return;
        try {
          const json = JSON.parse(raw);
          const delta = json.choices?.[0]?.delta?.content || '';
          box.textContent += delta;
        } catch {}
      });
    }
  } catch (e) {
    box.textContent = '生成失败：' + e.message;
    showToast('AI 摘要生成失败', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 生成摘要';
  }
}

/* ── 提取 PDF 文本 ───────────────────────────────────────────── */
async function extractPdfText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({ data: e.target.result }).promise;
        let text = '';
        for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(s => s.str).join(' ') + '\n';
        }
        resolve(text);
      } catch (err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

/* ── 提取 Word 文本 ──────────────────────────────────────────── */
async function extractWordText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
        resolve(result.value);
      } catch (err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

/* ── 提交上传 ────────────────────────────────────────────────── */
async function submitUpload() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '提交中…';

  try {
    let fileUrl  = '';
    let title    = '';
    let fileType = '';

    if (uploadTab === 'link') {
      fileUrl  = document.getElementById('link-url').value.trim();
      title    = document.getElementById('link-title').value.trim();
      fileType = 'link';
      if (!fileUrl) throw new Error('请填写链接地址');
      if (!title)   throw new Error('请填写标题');
    } else {
      if (!selectedFile) throw new Error('请选择文件');
      title    = document.getElementById('file-title').value.trim() || selectedFile.name;
      fileType = selectedFile.name.split('.').pop().toLowerCase();

      // 上传到 Supabase Storage
      fileUrl = await uploadFileToStorage(selectedFile);
    }

    const summary = document.getElementById('ai-summary').textContent.trim();

    // 写入 shares 表
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`,
      {
        method: 'POST',
        headers: sbHeaders({ 'Prefer': 'return=representation' }),
        body: JSON.stringify({
          title,
          summary: summary === 'AI 生成摘要后可在此手动编辑…' ? '' : summary,
          file_url: fileUrl,
          type: fileType,
        })
      }
    );
    if (!res.ok) throw new Error(await res.text());

    showToast('上传成功 🎉', 'success');
    closeUploadModal();
    loadList();
  } catch (e) {
    showToast('提交失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '📤 提交';
  }
}

/* ── 上传文件到 Supabase Storage ────────────────────────────── */
async function uploadFileToStorage(file) {
  const ext      = file.name.split('.').pop();
  const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const path     = `shares/${fileName}`;

  // 显示进度条
  const wrap = document.getElementById('upload-progress-wrap');
  const bar  = document.getElementById('upload-progress-bar');
  wrap.style.display = 'block';
  bar.style.width    = '30%';

  const res = await fetch(
    `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${path}`,
    {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': file.type || 'application/octet-stream',
      },
      body: file
    }
  );
  bar.style.width = '80%';
  if (!res.ok) throw new Error(await res.text());

  bar.style.width = '100%';
  // 返回公开 URL
  return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${path}`;
}

/* ── 删除弹窗 ────────────────────────────────────────────────── */
function openDeleteModal(id, name) {
  deletingId = id;
  document.getElementById('delete-name').textContent = name;
  document.getElementById('delete-modal').classList.add('open');
}
function closeDeleteModal() {
  deletingId = null;
  document.getElementById('delete-modal').classList.remove('open');
}
async function confirmDelete() {
  if (!deletingId) return;
  try {
    const item = allItems.find(i => i.id === deletingId);

    // 删除 Storage 文件（仅非链接类型）
    if (item && item.type !== 'link' && item.file_url) {
      const path = item.file_url.split(`/object/public/${SUPABASE_BUCKET}/`)[1];
      if (path) {
        await fetch(
          `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${path}`,
          { method: 'DELETE', headers: sbHeaders() }
        );
      }
    }

    // 删除数据库记录
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${deletingId}`,
      { method: 'DELETE', headers: sbHeaders() }
    );
    if (!res.ok) throw new Error(await res.text());

    showToast('删除成功', 'success');
    closeDeleteModal();
    loadList();
  } catch (e) {
    showToast('删除失败：' + e.message, 'error');
  }
}

/* ── 工具函数 ─────────────────────────────────────────────────── */
function fileTypeIcon(type) {
  const map = { pdf:'📄', ppt:'📊', pptx:'📊', doc:'📝', docx:'📝', link:'🔗' };
  return map[(type||'').toLowerCase()] || '📁';
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatSize(bytes) {
  if (bytes < 1024)        return bytes + ' B';
  if (bytes < 1024*1024)   return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}
function escHtml(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function onLinkInput() {
  const url   = document.getElementById('link-url').value.trim();
  const title = document.getElementById('link-title');
  if (url && !title.value) {
    try { title.value = new URL(url).hostname; } catch {}
  }
}
